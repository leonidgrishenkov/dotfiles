# All config options described here: https://docs.atuin.sh/configuration/config

# If enabled, upon hitting enter Atuin will immediately execute the command. Press tab to return to the shell and edit.
enter_accept = false

keymap_mode = "vim-insert"

style = 'compact'
invert = true

# regex that will be completly excluded from history
history_filter = [
    "^cd",
    "^(nvim|vim|vi|v)?\\s*\\.?\\s*$",
    "^ls\\s*-*(l|a|la|al)?\\s*\\.?\\s*$",
    "^(z|zoxide)\\s*.*$",
    "^.+\\s(-h|--help)\\s*$",
]

# whether to store commands that returned non-zero exit code.
store_failed = true

secrets_filter = false

keymap_cursor = { vim_insert = "blink-bar", vim_normal = "blink-block" }

# https://docs.atuin.sh/cli/configuration/config/#fuzzy-search-syntax
search_mode = "fuzzy"

sync_address = "https://do-ubuntu-2204-ams-1.tail372fc0.ts.net/atuin"

[theme]
name = "frappe/catppuccin-frappe-lavender"
